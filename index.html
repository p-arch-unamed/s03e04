<div id="login" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;">
  <h2>Insert the password</h2>
  <input type="password" id="senha">
  <button onclick="entrar()">Enter</button>
  <h6>Hint: (sdrawkcab ni TON si rewsna eht) .(hsilgnE ni) to delevart ev'uoy taht tnenitnoc tsaL</h6>
</div>

<div id="conteudo" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;">
  <h1>Message unlocked.</h1>
  <img src="img/invincible.jpeg" alt="Imagem" width="300">
  <p>.it ekil uoy taht wonk I esuaceb gnidnes tsuJ</p>
  <h6><i>Gift sender: ?</i></h6>
  <h2 id="contador"></h2>
  <p id="textoTempo"></p>
</div>

<script>
function entrar() {
  const senha = document.getElementById("senha").value;

  if (senha == "Europe" || senha == "europe") {
    document.getElementById("login").style.display = "none";
    document.getElementById("conteudo").style.display = "flex";
    iniciarContador();
  } else {
    alert("Senha errada...");
  }
}
function iniciarContador() {
  const dataAlvo = new Date("2026-09-10T00:00:00").getTime();

  const intervalo = setInterval(() => {
    const agora = new Date().getTime();
    const diff = dataAlvo - agora;

    if (diff <= 0) {
      clearInterval(intervalo);
      document.getElementById("contador").innerText = "";
      document.getElementById("textoTempo").innerText = "Atualize a página...";
      return;
    }

    const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutos = Math.floor((diff / (1000 * 60)) % 60);
    const segundos = Math.floor((diff / 1000) % 60);

    document.getElementById("contador").innerText =
      `${dias}d ${horas}h ${minutos}m ${segundos}s`;

    document.getElementById("textoTempo").innerText =
      "Tempo até uma possível nova mensagem... (data específica)";
  }, 1000);
}
</script>
